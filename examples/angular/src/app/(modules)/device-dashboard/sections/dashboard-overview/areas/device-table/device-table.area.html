<app-base-box>Devices</app-base-box>
@if (dashboardOverviewStateManagement.devices().length === 0) {
  <app-base-box>No devices.</app-base-box>
} @else {
  @for (d of dashboardOverviewStateManagement.devices(); track d.id) {
    <app-base-box>
      {{ d.name }} — {{ d.status }}
      <app-device-table-actions
        [device]="d"
        (toggle)="onToggle($event)"
      />
    </app-base-box>
  }
}
